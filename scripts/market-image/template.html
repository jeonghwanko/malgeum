<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  @font-face {
    font-family: "NanumPenScript";
    src: url("{{FONT_PATH}}") format("truetype");
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    font-family: -apple-system, "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
    background: linear-gradient(160deg, {{BG_FROM}}, {{BG_TO}});
    display: flex;
    flex-direction: column;
    align-items: center;
    position: relative;
  }

  /* 배경 장식 원 */
  .bg-circle-1 {
    position: absolute;
    top: -18vw;
    right: -18vw;
    width: 65vw;
    height: 65vw;
    border-radius: 50%;
    background: rgba(255,255,255,0.08);
    pointer-events: none;
  }
  .bg-circle-2 {
    position: absolute;
    bottom: 10vw;
    left: -28vw;
    width: 83vw;
    height: 83vw;
    border-radius: 50%;
    background: rgba(255,255,255,0.05);
    pointer-events: none;
  }

  /* 앱 이름 */
  .app-name {
    margin-top: 9.5vw;
    font-size: 3.5vw;
    font-weight: 800;
    color: rgba(255,255,255,0.95);
    letter-spacing: -0.05vw;
  }

  /* 카피 영역 */
  .copy-area {
    margin-top: 5.5vw;
    text-align: center;
    padding: 0 7.4vw;
    z-index: 1;
  }
  .copy-text {
    font-family: "NanumPenScript", sans-serif;
    font-size: 12.6vw;
    font-weight: 400;
    color: {{COPY_COLOR}};
    line-height: 1.2;
    letter-spacing: 0px;
    text-shadow: 0 0.4vw 2.2vw rgba(0,0,0,0.2);
  }
  .copy-sub {
    margin-top: 2.6vw;
    font-size: 3.3vw;
    font-weight: 500;
    color: rgba(255,255,255,0.78);
    line-height: 1.4;
    letter-spacing: -0.05vw;
  }

  /* 폰 프레임 */
  .phone-wrap {
    flex: 1;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    padding-bottom: 0;
    z-index: 1;
    width: 100%;
  }
  .phone-frame {
    width: 78%;
    border-radius: 4.8vw;
    overflow: hidden;
    box-shadow:
      0 3.7vw 11vw rgba(0,0,0,0.45),
      0 0 0 0.2vw rgba(255,255,255,0.2),
      inset 0 0 0 0.1vw rgba(255,255,255,0.1);
    transform: perspective(120vw) rotateX(2deg);
    transform-origin: bottom center;
  }
  .phone-frame img {
    width: 100%;
    display: block;
  }

  /* 하단 여백 */
  .bottom-pad {
    height: 7.4vw;
  }
</style>
</head>
<body>
  <div class="bg-circle-1"></div>
  <div class="bg-circle-2"></div>

  <div class="app-name">맑음 ☀️</div>

  <div class="copy-area">
    <div class="copy-text">{{COPY}}</div>
    <div class="copy-sub">{{SUB}}</div>
  </div>

  <div class="phone-wrap">
    <div class="phone-frame">
      <img src="{{SCREENSHOT}}" />
    </div>
  </div>

  <div class="bottom-pad"></div>
</body>
</html>
