<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  @font-face {
    font-family: "NanumPenScript";
    src: url("{{FONT_PATH}}") format("truetype");
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1024px;
    height: 500px;
    overflow: hidden;
    font-family: -apple-system, "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
    background: linear-gradient(135deg, {{BG_FROM}} 0%, {{BG_MID}} 50%, {{BG_TO}} 100%);
    display: flex;
    align-items: center;
    position: relative;
  }

  /* 배경 장식 */
  .bg-circle-1 {
    position: absolute;
    top: -180px;
    right: 200px;
    width: 520px;
    height: 520px;
    border-radius: 50%;
    background: rgba(255,255,255,0.07);
  }
  .bg-circle-2 {
    position: absolute;
    bottom: -200px;
    right: -100px;
    width: 500px;
    height: 500px;
    border-radius: 50%;
    background: rgba(255,255,255,0.05);
  }
  .bg-circle-3 {
    position: absolute;
    top: -80px;
    left: 380px;
    width: 300px;
    height: 300px;
    border-radius: 50%;
    background: rgba(255,255,255,0.04);
  }

  /* 왼쪽 텍스트 영역 */
  .left {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 0 64px;
    z-index: 1;
  }

  .app-badge {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    background: rgba(255,255,255,0.18);
    border: 1.5px solid rgba(255,255,255,0.3);
    border-radius: 40px;
    padding: 10px 24px;
    margin-bottom: 28px;
    width: fit-content;
  }
  .app-badge span {
    font-size: 22px;
    font-weight: 700;
    color: rgba(255,255,255,0.95);
    letter-spacing: -0.3px;
  }

  .copy-text {
    font-family: "NanumPenScript", sans-serif;
    font-size: 72px;
    font-weight: 400;
    color: #FFFFFF;
    line-height: 1.2;
    text-shadow: 0 4px 20px rgba(0,0,0,0.2);
    margin-bottom: 20px;
  }

  .copy-sub {
    font-size: 22px;
    font-weight: 400;
    color: rgba(255,255,255,0.72);
    line-height: 1.5;
    letter-spacing: -0.3px;
  }

  /* 오른쪽 폰 영역 */
  .right {
    width: 320px;
    height: 500px;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    z-index: 1;
    flex-shrink: 0;
    overflow: hidden;
    position: relative;
  }

  .phone-frame {
    width: 230px;
    border-radius: 36px;
    overflow: hidden;
    box-shadow:
      0 24px 80px rgba(0,0,0,0.5),
      0 0 0 2px rgba(255,255,255,0.18),
      inset 0 0 0 1px rgba(255,255,255,0.08);
    transform: perspective(800px) rotateY(-8deg) rotateX(2deg);
    transform-origin: bottom right;
    margin-bottom: 0;
  }
  .phone-frame img {
    width: 100%;
    display: block;
  }

  /* 페이드 마스크 (폰 상단 자연스럽게 페이드) */
  .right::before {
    content: "";
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 120px;
    background: linear-gradient(to bottom, {{BG_TO}}, transparent);
    z-index: 2;
  }
</style>
</head>
<body>
  <div class="bg-circle-1"></div>
  <div class="bg-circle-2"></div>
  <div class="bg-circle-3"></div>

  <div class="left">
    <div class="app-badge">
      <span>☀️ 맑음 Malgeum</span>
    </div>
    <div class="copy-text">{{COPY}}</div>
    <div class="copy-sub">{{SUB}}</div>
  </div>

  <div class="right">
    <div class="phone-frame">
      <img src="{{SCREENSHOT}}" />
    </div>
  </div>
</body>
</html>
